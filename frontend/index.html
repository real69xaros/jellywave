<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>JellyWave</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- App Wrapper -->
  <div id="app-wrapper" style="display:none">

    <!-- Hidden sidebar kept for JS compatibility (playlist data, nav events) -->
    <nav id="sidebar" style="display:none" aria-hidden="true">
      <ul class="nav-links">
        <li data-route="home" class="active"><i class="fa-solid fa-house"></i> Home</li>
        <li data-route="search"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
        <li data-route="library"><i class="fa-solid fa-book"></i> Library</li>
      </ul>
      <div class="playlists-section">
        <div class="section-header">
          <span>PLAYLISTS</span>
          <button id="create-playlist-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
        <ul class="playlist-links list-none" id="playlist-list"></ul>
      </div>
    </nav>

    <!-- Full-Screen Player Overlay (contains all official player control IDs) -->
    <div id="now-playing-bar">
      <div class="fp-handle-bar"></div>

      <div class="fp-topbar">
        <button class="fp-icon-btn" id="fp-down-btn"><i class="fa-solid fa-chevron-down"></i></button>
        <span class="fp-topbar-title">Now Playing</span>
        <button class="fp-icon-btn" id="queue-toggle-btn"><i class="fa-solid fa-list"></i></button>
      </div>

      <div class="fp-artwork-wrap">
        <img id="np-art" src="" alt="Artwork" style="display:none;">
        <div class="fp-artwork-placeholder"><i class="fa-solid fa-music"></i></div>
      </div>

      <div class="fp-info-row">
        <div class="fp-text">
          <div id="np-title" class="fp-song-title"></div>
          <div id="np-artist" class="fp-song-artist"></div>
        </div>
        <button id="np-like-btn" class="fp-icon-btn like-btn" style="display:none"><i class="fa-regular fa-heart"></i></button>
      </div>

      <div class="fp-seek-wrap">
        <input type="range" class="jelly-slider" id="seek-slider" min="0" value="0" step="1">
        <div class="fp-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div class="fp-controls">
        <button id="shuffle-btn" class="fp-ctrl-btn secondary"><i class="fa-solid fa-shuffle"></i></button>
        <button id="prev-btn" class="fp-ctrl-btn"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play-pause-btn" class="fp-play-btn"><i class="fa-solid fa-play"></i></button>
        <button id="next-btn" class="fp-ctrl-btn"><i class="fa-solid fa-forward-step"></i></button>
        <button id="repeat-btn" class="fp-ctrl-btn secondary"><i class="fa-solid fa-repeat"></i></button>
      </div>

      <div class="fp-volume-row">
        <i class="fa-solid fa-volume-low"></i>
        <input type="range" class="jelly-slider vol-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
        <i class="fa-solid fa-volume-high"></i>
      </div>

      <audio id="audio-player" playsinline></audio>
    </div>

    <!-- Mobile Shell -->
    <div id="mobile-shell">

      <!-- Top Header -->
      <header id="top-header">
        <div class="header-brand">
          <img src="img/logo-glow.svg" alt="JellyWave" style="height:22px;width:22px;margin-right:8px;">
          JellyWave
        </div>
        <div class="header-right">
          <button id="admin-panel-btn" class="btn-outline" style="display:none;" data-route="admin">Admin</button>
          <div class="profile-dropdown">
            <button id="profile-btn">
              <img id="profile-avatar" style="display:none; width:28px; height:28px; border-radius:50%; object-fit:cover;">
              <i id="profile-icon" class="fa-solid fa-user"></i>
            </button>
            <div class="dropdown-content" id="profile-menu">
              <div class="profile-menu-name" id="profile-name"></div>
              <a href="#" data-route="profile"><i class="fa-solid fa-user" style="width:14px;"></i> Profile</a>
              <a href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket" style="width:14px;"></i> Log out</a>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div id="views-container"></div>

      <!-- Mini Player Bar (tap to open full player) -->
      <div id="mini-player">
        <div class="mini-inner" id="mini-player-inner">
          <img id="mini-art" src="" alt="" style="display:none;">
          <div class="mini-art-placeholder"><i class="fa-solid fa-music"></i></div>
          <div class="mini-info">
            <div id="mini-title">Nothing playing</div>
            <div id="mini-artist"></div>
          </div>
          <div class="mini-btns">
            <button id="mini-play-btn" class="mini-btn"><i class="fa-solid fa-play"></i></button>
            <button id="mini-next-btn" class="mini-btn"><i class="fa-solid fa-forward-step"></i></button>
          </div>
        </div>
        <div class="mini-progress"><div class="mini-progress-fill" id="mini-progress-fill"></div></div>
      </div>

      <!-- Bottom Navigation -->
      <nav id="mobile-nav">
        <button class="tab-btn active" data-route="home">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </button>
        <button class="tab-btn" data-route="search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Search</span>
        </button>
        <button class="tab-btn" data-route="library">
          <i class="fa-solid fa-book-open"></i>
          <span>Library</span>
        </button>
        <button class="tab-btn" data-route="profile">
          <i class="fa-solid fa-user"></i>
          <span>Profile</span>
        </button>
      </nav>
    </div>

  </div>

  <!-- Auth Wrapper -->
  <div id="auth-wrapper"></div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/mobile.js"></script>
</body>
</html>
