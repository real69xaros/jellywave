<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JellyWave</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- App Wrapper -->
  <div id="app-wrapper" style="display: none;">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="logo">
        <img src="img/logo-glow.svg" alt="JellyWave" style="height: 28px; width: 28px;"> JellyWave
      </div>
      <ul class="nav-links">
        <li data-route="home" class="active"><i class="fa-solid fa-house"></i> Home</li>
        <li data-route="search"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
        <li data-route="library"><i class="fa-solid fa-book"></i> Your Library</li>
      </ul>
      <div class="playlists-section">
        <div class="section-header">
          <span>PLAYLISTS</span>
          <button id="create-playlist-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
        <ul class="playlist-links list-none" id="playlist-list">
          <!-- Playlists injected here -->
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Header -->
      <header id="top-header">
        <div class="header-left">
          <button class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="header-right">
          <button id="admin-panel-btn" class="btn-outline" style="display: none;" data-route="admin">Admin Panel</button>
          <div class="profile-dropdown">
            <button id="profile-btn" style="gap:8px;"><img id="profile-avatar" style="display:none; width:24px; height:24px; border-radius:50%; object-fit:cover;"><i id="profile-icon" class="fa-solid fa-user"></i> <span id="profile-name">User</span></button>
            <div class="dropdown-content" id="profile-menu">
              <a href="#" data-route="profile">Profile</a>
              <a href="#" id="logout-btn">Log out</a>
            </div>
          </div>
        </div>
      </header>

      <!-- Views Container -->
      <div id="views-container">
        <!-- Dashboard/Views injected here by app.js -->
      </div>
    </main>

    <!-- Now Playing Bar -->
    <footer id="now-playing-bar">
      <div class="now-playing-left">
        <img id="np-art" src="" alt="Artwork" style="display: none; width: 60px; height: 60px; border-radius: 4px; object-fit: cover; margin-right: 15px; cursor:pointer;">
        <div class="np-info">
          <div id="np-title" class="title"></div>
          <div id="np-artist" class="artist text-secondary" style="cursor:pointer;"></div>
        </div>
        <button id="np-like-btn" class="queue-action-btn" style="margin-left:15px; font-size:18px; display:none;"><i class="fa-regular fa-heart"></i></button>
      </div>
      
      <div class="now-playing-center">
        <div class="player-controls">
          <button id="shuffle-btn"><i class="fa-solid fa-shuffle"></i></button>
          <button id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
          <button id="play-pause-btn" class="play-circle"><i class="fa-solid fa-play"></i></button>
          <button id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
          <button id="repeat-btn"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <div class="playback-bar">
          <span id="time-current">0:00</span>
          <input type="range" class="jelly-slider" id="seek-slider" min="0" value="0" step="1">
          <span id="time-total">0:00</span>
        </div>
      </div>
      
      <div class="now-playing-right" style="justify-content: flex-end;">
        <button id="queue-toggle-btn" class="queue-action-btn" style="margin-right:20px; font-size:16px;"><i class="fa-solid fa-list"></i></button>
        <i class="fa-solid fa-volume-high" style="margin-right: 10px; color: var(--text-secondary); font-size:12px;"></i>
        <input type="range" class="jelly-slider vol-slider" id="volume-slider" min="0" max="1" step="0.01" value="1" style="width: 60px;">
      </div>
      <audio id="audio-player"></audio>
    </footer>
  </div>

  <!-- Auth Wrapper -->
  <div id="auth-wrapper">
    <!-- Auth screens injected by UI JS -->
  </div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
