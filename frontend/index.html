<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>JellyWave</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- App Wrapper -->
  <div id="app-wrapper" style="display:none">

    <!-- Sidebar (desktop) -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <img src="img/logo-glow.svg" alt="JellyWave" style="height:28px;width:28px;">
        <span>JellyWave</span>
      </div>
      <ul class="nav-links">
        <li data-route="home" class="active"><i class="fa-solid fa-house"></i> Home</li>
        <li data-route="search"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
        <li data-route="library"><i class="fa-solid fa-book"></i> Library</li>
      </ul>
      <div class="playlists-section">
        <div class="section-header">
          <span>PLAYLISTS</span>
          <button id="create-playlist-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
        <ul class="playlist-links list-none" id="playlist-list"></ul>
      </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">

      <!-- Top Header -->
      <header id="top-header">
        <div class="header-left">
          <button class="nav-back-btn" id="back-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="nav-back-btn" id="fwd-btn"><i class="fa-solid fa-chevron-right"></i></button>
          <!-- Mobile brand (shown only on mobile) -->
          <div class="header-brand mobile-only" style="display:none;">
            <img src="img/logo-glow.svg" alt="JellyWave" style="height:22px;width:22px;margin-right:8px;">
            JellyWave
          </div>
        </div>
        <div class="header-right">
          <button id="admin-panel-btn" class="btn-outline" style="display:none;" data-route="admin">Admin</button>
          <div class="profile-dropdown">
            <button id="profile-btn">
              <img id="profile-avatar" style="display:none; width:28px; height:28px; border-radius:50%; object-fit:cover;">
              <i id="profile-icon" class="fa-solid fa-user"></i>
            </button>
            <div class="dropdown-content" id="profile-menu">
              <div class="profile-menu-name" id="profile-name"></div>
              <a href="#" data-route="profile"><i class="fa-solid fa-user" style="width:14px;"></i> Profile</a>
              <a href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket" style="width:14px;"></i> Log out</a>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div id="views-container"></div>

    </div><!-- /#main-content -->

    <!-- Now Playing Bar (desktop footer / mobile full-screen overlay) -->
    <div id="now-playing-bar">

      <!-- Mobile-only header inside the player overlay -->
      <div class="now-playing-mobile-header mobile-only" style="display:none;">
        <button class="fp-icon-btn" id="fp-down-btn"><i class="fa-solid fa-chevron-down"></i></button>
        <span class="fp-topbar-title">Now Playing</span>
        <button class="fp-icon-btn" id="mobile-queue-btn"><i class="fa-solid fa-list"></i></button>
      </div>

      <!-- Desktop: three-column layout -->
      <div class="now-playing-left">
        <img id="np-art" src="" alt="Artwork" style="display:none;">
        <div class="np-info">
          <div id="np-title"></div>
          <div id="np-artist"></div>
        </div>
        <button id="np-like-btn" class="np-like-btn" style="display:none"><i class="fa-regular fa-heart"></i></button>
      </div>

      <div class="now-playing-center">
        <div class="player-controls">
          <button id="shuffle-btn" class="ctrl-btn secondary"><i class="fa-solid fa-shuffle"></i></button>
          <button id="prev-btn" class="ctrl-btn"><i class="fa-solid fa-backward-step"></i></button>
          <button id="play-pause-btn" class="play-btn"><i class="fa-solid fa-play"></i></button>
          <button id="next-btn" class="ctrl-btn"><i class="fa-solid fa-forward-step"></i></button>
          <button id="repeat-btn" class="ctrl-btn secondary"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <div class="playback-bar">
          <span id="time-current">0:00</span>
          <input type="range" class="jelly-slider" id="seek-slider" min="0" value="0" step="1">
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div class="now-playing-right">
        <button id="queue-toggle-btn" class="ctrl-btn secondary"><i class="fa-solid fa-list"></i></button>
        <i class="fa-solid fa-volume-low"></i>
        <input type="range" class="jelly-slider vol-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
      </div>

      <audio id="audio-player" playsinline></audio>
    </div><!-- /#now-playing-bar -->

    <!-- Mobile-only: Mini Player Bar (tap to open full player) -->
    <div id="mini-player" class="mobile-only" style="display:none;">
      <div class="mini-inner" id="mini-player-inner">
        <img id="mini-art" src="" alt="" style="display:none;">
        <div class="mini-art-placeholder"><i class="fa-solid fa-music"></i></div>
        <div class="mini-info">
          <div id="mini-title">Nothing playing</div>
          <div id="mini-artist"></div>
        </div>
        <div class="mini-btns">
          <button id="mini-play-btn" class="mini-btn"><i class="fa-solid fa-play"></i></button>
          <button id="mini-next-btn" class="mini-btn"><i class="fa-solid fa-forward-step"></i></button>
        </div>
      </div>
      <div class="mini-progress"><div class="mini-progress-fill" id="mini-progress-fill"></div></div>
    </div>

    <!-- Mobile-only: Bottom Navigation -->
    <nav id="mobile-nav" class="mobile-only" style="display:none;">
      <button class="tab-btn active" data-route="home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </button>
      <button class="tab-btn" data-route="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Search</span>
      </button>
      <button class="tab-btn" data-route="library">
        <i class="fa-solid fa-book-open"></i>
        <span>Library</span>
      </button>
      <button class="tab-btn" data-route="profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </button>
    </nav>

    <!-- Hidden element used by mobile.js to close player -->
    <button id="fp-down-btn-desktop" style="display:none;" aria-hidden="true"></button>

  </div><!-- /#app-wrapper -->

  <!-- Auth Wrapper -->
  <div id="auth-wrapper"></div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/mobile.js"></script>
</body>
</html>
